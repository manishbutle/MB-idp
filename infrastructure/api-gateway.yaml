  # Deployment
  IdpApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - AuthPostMethod
      - ForgetPasswordPostMethod
      - ResetPasswordPostMethod
      - SignUpPostMethod
      - ProcessDocumentPostMethod
      - DatapointsGetMethod
      - ResetPromptsPostMethod
      - HistoryGetMethod
      - MytransactionsGetMethod
      - TotalDocumentProcessedGetMethod
      - AvailableBalanceGetMethod
      - ProfileChangePostMethod
      - PasswordChangePostMethod
      - TopUpPostMethod
      - AddCreditPostMethod
      - FtpPostMethod
      - SendEmailPostMethod
    Properties:
      RestApiId: !Ref IdpRestApi
      Description: Production deployment with all 16 endpoints

  # Stage
  IdpApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref IdpRestApi
      DeploymentId: !Ref IdpApiDeployment
      StageName: v1
      Description: Production stage v1
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 100

  # Usage Plan for rate limiting (100 req/min per user, 1000 req/min per tenant)
  IdpUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: ai-document-processing-usage-plan
      Description: Usage plan with rate limiting - 100 req/min per user, 1000 req/min per tenant
      ApiStages:
        - ApiId: !Ref IdpRestApi
          Stage: !Ref IdpApiStage
      Throttle:
        BurstLimit: 1000
        RateLimit: 100
      Quota:
        Limit: 100000
        Period: MONTH

  # Gateway Response for CORS on 4XX errors
  GatewayResponse4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref IdpRestApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"

  # Gateway Response for CORS on 5XX errors
  GatewayResponse5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref IdpRestApi
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"

Outputs:
  ApiGatewayUrl:
    Description: URL of the API Gateway
    Value: !Sub 'https://${IdpRestApi}.execute-api.${AWS::Region}.amazonaws.com/v1'
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayUrl'

  RestApiId:
    Description: ID of the REST API
    Value: !Ref IdpRestApi
    Export:
      Name: !Sub '${AWS::StackName}-RestApiId'
  
  ApiStage:
    Description: API Gateway Stage
    Value: !Ref IdpApiStage
    Export:
      Name: !Sub '${AWS::StackName}-ApiStage'

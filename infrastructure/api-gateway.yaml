AWSTemplateFormatVersion: '2010-09-09'
Description: 'API Gateway Configuration for AI Document Processing'

Parameters:
  CognitoUserPoolArn:
    Type: String
    Description: ARN of the Cognito User Pool for authentication
    Default: ''
  
  AuthLambdaArn:
    Type: String
    Description: ARN of the Auth Lambda function
    Default: ''
  
  ProcessLambdaArn:
    Type: String
    Description: ARN of the Process Lambda function
    Default: ''
  
  DataLambdaArn:
    Type: String
    Description: ARN of the Data Lambda function
    Default: ''
  
  AdminLambdaArn:
    Type: String
    Description: ARN of the Admin Lambda function
    Default: ''
  
  IntegrationLambdaArn:
    Type: String
    Description: ARN of the Integration Lambda function
    Default: ''

Resources:
  # REST API
  IdpRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: ai-document-processing-api
      Description: REST API for AI Document Processing
      EndpointConfiguration:
        Types:
          - REGIONAL
  
  # Cognito Authorizer
  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: CognitoAuthorizer
      Type: COGNITO_USER_POOLS
      RestApiId: !Ref IdpRestApi
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !Ref CognitoUserPoolArn

  # Request/Response Models
  ErrorResponseModel:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref IdpRestApi
      ContentType: application/json
      Name: ErrorResponse
      Schema:
        $schema: 'http://json-schema.org/draft-04/schema#'
        type: object
        properties:
          error:
            type: string
          message:
            type: string
        required:
          - error
          - message
  
  SuccessResponseModel:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref IdpRestApi
      ContentType: application/json
      Name: SuccessResponse
      Schema:
        $schema: 'http://json-schema.org/draft-04/schema#'
        type: object
        properties:
          message:
            type: string
          data:
            type: object

  # Auth Resource
  AuthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: auth

  # Forget Password Resource
  ForgetPasswordResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: forget_password

  # Reset Password Resource
  ResetPasswordResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: reset_password

  # Sign Up Resource
  SignUpResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: sign_up

  # Process Document Resource
  ProcessDocumentResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: process_document

  # Datapoints Resource
  DatapointsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: datapoints

  # Reset Prompts Resource
  ResetPromptsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: reset_prompts

  # History Resource
  HistoryResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: history

  # My Transactions Resource
  MyTransactionsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: mytransactions

  # Total Document Processed Resource
  TotalDocumentProcessedResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: total_document_processed

  # Available Balance Resource
  AvailableBalanceResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: available_balance

  # Profile Change Resource
  ProfileChangeResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: profile_change

  # Password Change Resource
  PasswordChangeResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: password_change

  # Top Up Resource
  TopUpResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: top_up

  # Add Credit Resource
  AddCreditResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: add_credit

  # FTP Resource
  FtpResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: ftp

  # Send Email Resource
  SendEmailResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IdpRestApi
      ParentId: !GetAtt IdpRestApi.RootResourceId
      PathPart: send_email

  # Lambda Permissions for API Gateway
  AuthLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuthLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${IdpRestApi}/*'
  
  ProcessLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${IdpRestApi}/*'
  
  DataLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DataLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${IdpRestApi}/*'
  
  AdminLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AdminLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${IdpRestApi}/*'
  
  IntegrationLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IntegrationLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${IdpRestApi}/*'

  # Request Validator
  RequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      RestApiId: !Ref IdpRestApi
      Name: RequestBodyValidator
      ValidateRequestBody: true
      ValidateRequestParameters: false


  # POST /auth
  AuthPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref IdpRestApi
      ResourceId: !Ref AuthResource
      HttpMethod: POST
      AuthorizationType: NONE
      RequestValidatorId: !Ref RequestValidator
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthLambdaArn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
        - StatusCode: 400
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
        - StatusCode: 401
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
        - StatusCode: 500
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true


  # OPTIONS /auth (CORS)
  AuthOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref IdpRestApi
      ResourceId: !Ref AuthResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true



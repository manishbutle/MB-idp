<!DOCTYPE html>
<html>
<head>
  <title>Clear Session</title>
</head>
<body>
  <h1>Clear Extension Session</h1>
  <button id="clearBtn">Clear Session Storage</button>
  <div id="result"></div>
  
  <script>
    document.getElementById('clearBtn').addEventListener('click', async () => {
      try {
        // Clear all storage
        await chrome.storage.local.clear();
        document.getElementById('result').innerHTML = '<p style="color: green;">Session cleared! Please close this tab and reload the extension.</p>';
      } catch (error) {
        document.getElementById('result').innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
      }
    });
  </script>
</body>
</html>
